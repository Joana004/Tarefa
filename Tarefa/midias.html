<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Site com Mídias</title>

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 font-sans p-6">

<div class="max-w-3xl mx-auto bg-white p-8 rounded-lg shadow space-y-8">

<!-- Título -->
<h1 class="text-3xl font-bold text-center">
Site com Áudio, Imagem e Vídeo
</h1>

<!-- Áudio -->
<div>
<h2 class="text-xl font-semibold mb-3">Áudio</h2>

<audio controls class="w-full">
<source src="mus/marilia_mendonca_supera_todos_os_cantos_mp3_72346_030840.mp3" type="audio/mp3">
Seu navegador não suporta o elemento de áudio.
</audio>

</div>

<!-- Imagem -->
<div>
<h2 class="text-xl font-semibold mb-3">Imagem</h2>

<img 
src="img/4.jpeg" 
alt="Imagem de exemplo"
class="w-full rounded-lg shadow-md"
>

</div>

<!-- Vídeo -->
<div>
<h2 class="text-xl font-semibold mb-3">Vídeo</h2>

<video controls class="w-full rounded-lg shadow-md">
<source src="vid/VID-20260111-WA0046 (1).mp4" type="video/mp4">
Seu navegador não suporta o elemento de vídeo.
</video>

</div>

</div>

<!-- Botão voltar -->
<div class="text-center mt-6">
<a href="tri1.html" class="text-blue-600 font-semibold hover:underline">
⬅ VOLTAR
</a>
</div>

</body>
</html>
