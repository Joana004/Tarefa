<html>
<head>
    <title>Layout Página</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            padding: 10px;
        }

        /* Menu */
        .menu {
            background-color: #9FD356;
            border: 2px solid #333;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 24px;
            margin-bottom: 10px;
        }

        /* Side Bar / Slide Bar */
        .slidebar {
            background-color: #B8E986;
            border: 2px solid #333;
            padding: 60px 20px;
            text-align: center;
            font-weight: bold;
            font-size: 20px;
            margin-bottom: 20px;
        }

        /* Container Fotos */
        .fotos-container {
            display: flex;
            justify-content: space-around;
            gap: 20px;
            margin-bottom: 20px;
            padding: 0 20px;
        }

        .foto-box {
            background-color: #B8E986;
            border: 2px solid #333;
            width: 120px;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            overflow: hidden;
        }

        .foto-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Container Textos */
        .textos-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            padding: 0 20px;
        }

        .texto-box {
            background-color: #B8E986;
            border: 2px solid #333;
            flex: 1;
            padding: 30px;
            font-weight: bold;
            font-size: 16px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* Footer */
        .footer {
            background-color: #9FD356;
            border: 2px solid #333;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <!-- Menu -->
    <div class="menu">MENU</div>

    <!-- Slide Bar -->
    <div class="slidebar">SIDE BAR</div>

    <!-- Três Fotos -->
    <div class="fotos-container">
        <div class="foto-box">
            <img src="img/3.jpg" alt="Foto 1">
        </div>
        <div class="foto-box">
            <img src="img/2.jpg" alt="Foto 2">
        </div>
        <div class="foto-box">
            <img src="img/1.jpg" alt="Foto 3">
        </div>
    </div>

    <!-- Dois Textos -->
    <div class="textos-container">
        <div class="texto-box">
            Davi não odiou Saul mas manteve a distancia necessária.
            Perdoe sim,mas entenda que algumas pessoas não são mais para você.
        </div>
        <div class="texto-box">
            O amor não é o primeiro a morrer.
            O que morre antes é a falta de atenção.
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">FOOTER</div>
    <a href="tri2.html">VOLTAR</a>
</body>
</html>
